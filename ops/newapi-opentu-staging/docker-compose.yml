name: newapi-opentu-staging

services:
  new-api:
    image: new-api-creative-embed:staging-current
    container_name: newapi-opentu-staging-new-api
    restart: unless-stopped
    command: ["--log-dir", "/app/logs"]
    ports:
      - "${STAGING_BIND_ADDR:-127.0.0.1}:${STAGING_PORT:-39084}:3000"
    env_file:
      - ./.env.staging.local
    environment:
      GIN_MODE: release
      TZ: Asia/Shanghai
      SYNC_FREQUENCY: "3600"
      UPDATE_TASK: "false"
      CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED: "false"
    volumes:
      - newapi_opentu_staging_data:/data
      - newapi_opentu_staging_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":[[:space:]]*true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  newapi_opentu_staging_data:
  newapi_opentu_staging_logs:
